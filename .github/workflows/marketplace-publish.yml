name: Build Extension Assets

on:
    push:
        branches:
            - main-vertex
    workflow_dispatch:

env:
    NODE_VERSION: 20.20.0
    PNPM_VERSION: 10.8.1

jobs:
    build-assets:
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
              with:
                  ref: ${{ github.sha }}
                  submodules: recursive
                  lfs: true

            - name: Install pnpm
              uses: pnpm/action-setup@v4
              with:
                  version: ${{ env.PNPM_VERSION }}

            - name: Setup Node.js
              uses: actions/setup-node@v6
              with:
                  node-version: ${{ env.NODE_VERSION }}
                  cache: "pnpm"

            - name: Setup Java
              uses: actions/setup-java@v5
              with:
                  distribution: "jetbrains"
                  java-version: "21"
                  check-latest: false

            - name: Setup Gradle
              uses: gradle/actions/setup-gradle@v5
              with:
                  cache-read-only: false

            - name: Install system dependencies
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libx11-dev \
                    libxkbfile-dev \
                    pkg-config \
                    build-essential \
                    python3

            - name: Install dependencies
              run: pnpm install

            - name: Create local .env for build
              run: printf "KILOCODE_POSTHOG_API_KEY=\n" > .env

            - name: Get version
              id: get_version
              run: |
                  current_package_version=$(node -p "require('./src/package.json').version")
                  echo "version=${current_package_version}" >> "$GITHUB_OUTPUT"
                  echo "Version: ${current_package_version}"

            - name: Build release metadata
              id: release_meta
              run: |
                  utc_stamp=$(date -u +'%Y%m%d-%H%M%S')
                  release_tag="vertex-v${{ steps.get_version.outputs.version }}-${utc_stamp}"
                  release_name="Vertex ${release_tag}"
                  echo "utc_stamp=${utc_stamp}" >> "$GITHUB_OUTPUT"
                  echo "release_tag=${release_tag}" >> "$GITHUB_OUTPUT"
                  echo "release_name=${release_name}" >> "$GITHUB_OUTPUT"
                  echo "Release tag: ${release_tag}"

            - name: Build VS Code extension package
              run: pnpm vsix:production

            - name: Verify VSIX artifact exists
              run: |
                  test -f "bin/kilo-code-${{ steps.get_version.outputs.version }}.vsix"

            - name: Build JetBrains plugin bundle
              run: bash ./build-jetbrains-plugin.sh

            - name: Get JetBrains bundle name
              id: get_bundle_name
              run: |
                  bundle_name=$(node jetbrains/plugin/scripts/get_bundle_name.js)
                  echo "bundle_name=${bundle_name}" >> "$GITHUB_OUTPUT"
                  echo "Bundle: ${bundle_name}"

            - name: Verify JetBrains bundle exists
              run: |
                  test -f "jetbrains/plugin/build/distributions/${{ steps.get_bundle_name.outputs.bundle_name }}"

            - name: Create immutable GitHub Release
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              run: |
                  gh release create "${{ steps.release_meta.outputs.release_tag }}" \
                    --title "${{ steps.release_meta.outputs.release_name }}" \
                    --notes "Automated internal build release for main-vertex. Version: ${{ steps.get_version.outputs.version }}. UTC build timestamp: ${{ steps.release_meta.outputs.utc_stamp }}." \
                    --target "${{ github.sha }}" \
                    "bin/kilo-code-${{ steps.get_version.outputs.version }}.vsix#VS Code plugin (${{ steps.get_version.outputs.version }}).vsix" \
                    "jetbrains/plugin/build/distributions/${{ steps.get_bundle_name.outputs.bundle_name }}#JetBrains plugin (${{ steps.get_version.outputs.version }})"

            - name: Upload VSIX artifact
              uses: actions/upload-artifact@v6
              with:
                  name: VS Code plugin (${{ steps.get_version.outputs.version }})
                  path: bin/kilo-code-${{ steps.get_version.outputs.version }}.vsix
                  if-no-files-found: error
                  retention-days: 14

            - name: Upload JetBrains plugin artifact
              uses: actions/upload-artifact@v6
              with:
                  name: JetBrains plugin (${{ steps.get_version.outputs.version }})
                  path: jetbrains/plugin/build/distributions/${{ steps.get_bundle_name.outputs.bundle_name }}
                  if-no-files-found: error
                  retention-days: 14
